<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retail FSM Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="header-toolbar">
      <div
        style="margin-left: 20px;color: #6b7280;font-size: 0.85rem;font-weight: 500;">Retail Automata Dashboard</div>
    </div>

    <div id="constructor-panel" class="panel">
      <div class="handle">::: FSM CONSTRUCTOR</div>
      <div class="panel-content">
        <section>
          <h4>1. Define Features (Binary)</h4>
          <div id="feature-list">
            </div>
          <button onclick="addNewFeature()" class="ui-btn">+ Add Feature</button>
        </section>
        
        <hr>

        <section>
          <h4>2. Define Food Sequence</h4>
          <p class="hint">Use alphabet symbols (e.g., 'b', 'o', 'a', 'r')</p>
          <input type="text" id="food-input" placeholder="e.g. boaa" class="full-width">
        </section>

        <button id="generate-fsm-btn" class="primary-btn">Generate Monotonic FSM</button>
      </div>
    </div>

    <div id="args-panel" class="panel">
      <div class="handle">::: CURRENT ARGUMENTS</div>
      <div class="panel-content">
        <div id="active-args-display">
          <p>No FSM generated yet.</p>
        </div>
      </div>
    </div>

    <div id="viz-panel" class="panel" style="display: flex; flex-direction: column;">
      <div class="handle">::: FSM VISUALIZER</div>
      <div id="viz-container" style="flex-grow: 1; min-height: 0; background: white; position: relative;">
        <button onclick="viz.toggleReachability()"style="cursor: pointer; padding: 6px 12px">
          Toggle View Mode
        </button>
        <canvas id="fsmCanvas"></canvas>
      </div>
      <div id="viz-resizer" style="width:10px; height:10px; cursor:nwse-resize; position:absolute; bottom:0; right:0; background:#ccc;"></div>
    </div>

    <script src="./fsm.js"></script>
    <script src="./viz.js"></script>
    <script src="./ui.js"></script>
    
    <script>
      const featureNames = [
        "fiber",
        "carbohydrates",
        "protien",
        "mt_100_Pesos",
        "mt_500_Pesos",
        "mt_1000_Pesos",
      ];
      const FT = MonotonicDFA.encodeFEATURES(featureNames);

      const S_map = {
        b: FT["fiber"] | FT["mt_100_Pesos"],
        o: FT["carbohydrates"] | FT["fiber"] | FT["mt_500_Pesos"],
        a: FT["carbohydrates"] | FT["mt_100_Pesos"],
        r: FT["protien"] | FT["mt_100_Pesos"],
      };

      const mono = MonotonicDFA.WithFeatures(featureNames, S_map, 0);
      const viz = new MonotonicVisualizer("fsmCanvas", mono, FT);

      // Initialize UI
      initUIExtensions(featureNames, S_map);
    </script>
  </body>
</html>
