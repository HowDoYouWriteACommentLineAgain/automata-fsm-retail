<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retail FSM Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <button
      onclick="viz.toggleReachability()"
      style="position: fixed; top: 10px; right: 10px; z-index: 101"
    >
      Toggle View Mode
    </button>

    <div id="config-panel" class="panel">
      <div class="handle">::: DRAG TO MOVE</div>
      <strong>State Variables</strong>
      <hr />
      <div id="ui-feature-list"></div>
    </div>

    <div id="legend-panel" class="panel">
      <strong>Active S_map Keys</strong>
      <ul id="ui-smap-list" style="padding-left: 20px; margin: 5px 0"></ul>
    </div>

    <canvas id="fsmCanvas"></canvas>

    <script src="./fsm.js"></script>
    <script src="./viz.js"></script>
    <script src="./ui.js"></script>
    <script>
      const featureNames = [
        "fiber",
        "carbohydrates",
        "protien",
        "mt_100_Pesos",
        "mt_500_Pesos",
        "mt_1000_Pesos",
      ];
      const FT = MonotonicDFA.encodeFEATURES(featureNames);

      const S_map = {
        b: FT["fiber"] | FT["mt_100_Pesos"],
        o: FT["carbohydrates"] | FT["fiber"] | FT["mt_500_Pesos"],
        a: FT["carbohydrates"] | FT["mt_100_Pesos"],
        r: FT["protien"] | FT["mt_100_Pesos"],
      };

      const mono = MonotonicDFA.WithFeatures(featureNames, S_map, 0);
      const viz = new MonotonicVisualizer("fsmCanvas", mono, FT);
      initUIExtensions(featureNames, S_map);
    </script>
  </body>
</html>
