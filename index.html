<body>
  <button onclick="viz.toggleReachability()" style="position:fixed; top:10px; right:10px;">
    Toggle View Mode
  </button>
  <canvas id="fsmCanvas"></canvas>
  <script src="./fsm.js"></script>
  <script src="./viz.js"></script>
  <script>

  const featureNames = ["fiber", "carbohydrates", "protien", "mt_100_Pesos", "mt_500_Pesos", "mt_1000_Pesos"];
  const FT = MonotonicDFA.encodeFEATURES(featureNames);

  const S_map = {
    b: FT["fiber"] | FT["mt_100_Pesos"],
    o: FT["carbohydrates"] | FT["fiber"] | FT["mt_500_Pesos"],
    a: FT["carbohydrates"] | FT["mt_100_Pesos"],
    r: FT["protien"] | FT["mt_100_Pesos"],
  };

  // Pass the ARRAY first, then the MAP
  const mono = MonotonicDFA.WithFeatures(featureNames, S_map, 0, );
    const viz = new MonotonicVisualizer("fsmCanvas", mono, FT);
    //.getFinalStateOf(["b","o"])

    
  </script>
</body>
